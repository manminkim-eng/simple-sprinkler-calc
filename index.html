/* ═══ A4 계산서 반응형 미리보기 ═══

   ③ outer.height = inner.scrollHeight×scale+40 → 여러 장·빈공간 없음
   인쇄: @media print { transform:none } 으로 원본 A4 복원           */

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect } = React;

/* ═══ 상수 (NFTC 103A) ═══════════════════════════════════════ */
const NOZZLE_HEAD      = 10;          // 헤드 최소 방수압력 0.1 MPa = 10 m
const FLOW_PER_HEAD_G  = 50;          // 일반 간이헤드 방사량 (ℓ/min) — NFTC 103A §2.2.1
const FLOW_PER_HEAD_P  = 80;          // 주차장 표준반응형 방사량 (ℓ/min) — NFTC 103A §2.3.1.7

/* 기준 유형 (NFTC 103A §2.1.1.2, §2.2.1) */
const BASE_HEAD_TYPES = [
  { key:"A2",  label:"일반형 — 2개 간이헤드 × 10분 (일반 용도)",          n:2,  q:50, t:10 },
  { key:"A5",  label:"특수형 — 5개 간이헤드 × 20분 (영 별표4 제1호마목 2가 또는 6·8)", n:5, q:50, t:20 },
  { key:"AP2", label:"주차장(일반) — 표준반응형 2개 × 10분 (80 ℓ/min)",                       n:2,  q:80, t:10 },
  { key:"AP5", label:"주차장(특수) — 표준반응형 5개 × 20분 (80 ℓ/min)",                       n:5,  q:80, t:20 },
];

const PIPE_CONFIG = {
  SCH10:{label:"배관용 탄소강관 KS D3507 (백관)",        shortLabel:"KS D3507",       C:120,
         inner:{25:27.6,32:36.2,40:42.1,50:53.2,65:69.0,80:81.0,100:105.3,125:130.1,150:155.5,200:204.6}},
  SCH40:{label:"압력 배관용 탄소강관 KS D 3562 (흑관)",  shortLabel:"KS D3562",       C:120,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:77.9,100:102.3,125:128.2,150:154.1,200:202.7}},
  STS:  {label:"배관용 스테인리스강관 KS D 3595",        shortLabel:"STS(스테인리스)",C:150,
         inner:{25:27.6,32:36.8,40:42.8,50:54.8,65:70.0,80:85.0,100:108.2,125:133.4,150:160.0,200:210.0}},
  CPVC: {label:"내식성 CPVC관 (소방용)",                shortLabel:"CPVC",           C:150,
         inner:{25:26.6,32:35.1,40:40.9,50:52.5,65:62.7,80:79.4,100:101.6,125:127.0,150:154.1,200:203.2}},
};

/* [90°엘보,45°엘보,분류T,직류T,Gate,Ball,Angle,Check] — m 상당직관 */
const FITTING_EQ={
  25:[0.9,0.54,1.5,0.27,0.18,7.5,4.5,2.0],  32:[1.2,0.72,1.8,0.36,0.24,10.5,5.4,2.5],
  40:[1.5,0.90,2.1,0.45,0.30,13.8,6.5,3.1], 50:[2.1,1.20,3.0,0.60,0.39,16.5,8.4,4.0],
  65:[2.4,1.30,3.6,0.75,0.48,19.5,10.2,4.6],80:[3.0,1.80,4.5,0.90,0.60,24.0,12.0,5.7],
  100:[4.2,2.40,6.3,1.20,0.81,37.5,16.5,7.6],125:[5.1,3.00,7.5,1.50,0.99,42.0,21.0,10.0],
  150:[6.0,3.60,9.0,1.80,1.20,49.5,24.0,12.0],200:[6.5,3.70,14.0,4.00,1.40,70.0,33.0,15.0],
};

const PUMP_EFF ={40:0.40,50:0.45,65:0.55,80:0.55,100:0.60,125:0.65,150:0.70};
const TRANS_TYPE={1:{label:"전동기 직결",k:1.1},2:{label:"전동기 이외의 원동기",k:1.15}};
const PIPE_SIZES=[25,32,40,50,65,80,100,125,150,200];
const PUMP_SIZES=[40,50,65,80,100,125,150];
const HP_STEPS  =[3,5,7.5,10,15,20,25,30,40,50,60,75,100,125,150,200];

/* ═══ 유틸리티 ════════════════════════════════════════════════ */
function calcFriction(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D]; if(!Di)return 0;
  return 10.67*Math.pow(Q/60000,1.852)/(Math.pow(cfg.C,1.852)*Math.pow(Di/1000,4.87))*100;
}
function calcVelocity(Q,D,pipeType){
  if(!Q||!D)return 0;
  const cfg=PIPE_CONFIG[pipeType]||PIPE_CONFIG.SCH10;
  const Di=cfg.inner[D]; if(!Di)return 0;
  return (Q/60000)/(Math.PI*Math.pow(Di/2000,2));
}
function nextHP(kw){
  const hp=kw*1.341;
  for(const h of HP_STEPS){if(h>=hp)return h;}
  return Math.ceil(hp/5)*5;
}
function f3(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*1000)/1000).toFixed(3);}
function f2(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*100)/100).toFixed(2);}
function f1(v){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*10)/10).toFixed(1);}
function ff(v,d=2){if(v===null||v===undefined||isNaN(v))return"─";return(Math.round(v*Math.pow(10,d))/Math.pow(10,d)).toFixed(d);}

const mkSeg=()=>({flow:50,dia:50,len:0,e90:0,e45:0,teeB:0,teeS:0,gate:0,ball:0,angle:0,check:0});

/* ═══ 스타일 토큰 ════════════════════════════════════════════ */
const BD="1px solid #d1d5db";
const S={
  border:BD,
  cell:{border:BD,padding:"4px 6px",textAlign:"center",fontFamily:"'Noto Sans KR',sans-serif",fontSize:11},
};
const SEC_TITLE_STYLE={
  background:"#1e3a5f",color:"white",padding:"7px 14px",
  fontWeight:800,fontSize:13,borderRadius:"6px 6px 0 0",
  letterSpacing:"0.04em",fontFamily:"'Noto Sans KR',sans-serif",
};

/* ═══ 컴포넌트 ══════════════════════════════════════════════ */
/* Box — 앰버 헤더 바 + 내부 패딩 카드 */
function Box({title,accent,children}){
  const bg=accent||"#d97706";
  return(
    <div style={{background:"white",borderRadius:12,border:"1px solid #e5e7eb",overflow:"hidden",boxShadow:"0 1px 6px rgba(0,0,0,0.07)"}}>
      <div className="box-hd" style={{background:`linear-gradient(135deg,${bg},${bg}dd)`}}>
        <span style={{fontSize:15,opacity:0.85}}>◆</span>{title}
      </div>
      <div className="box-bd">
        {children}
      </div>
    </div>
  );
}
function LabelEl({children}){return <label style={{display:"block",fontSize:11,fontWeight:700,color:"#6b7280",textTransform:"uppercase",letterSpacing:"0.06em",marginBottom:5}}>{children}</label>;}
function InpText({val,onChange,placeholder}){
  return <input type="text" value={val} placeholder={placeholder||""} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>;
}
function InpNum({val,onChange,unit,min,max}){
  return(
    <div style={{display:"flex",alignItems:"center",gap:6}}>
      <input type="number" value={val} min={min} max={max} onChange={e=>onChange(parseFloat(e.target.value)||0)}
        style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:13,outline:"none"}}/>
      {unit&&<span style={{fontSize:12,color:"#6b7280",whiteSpace:"nowrap"}}>{unit}</span>}
    </div>
  );
}
function Sel({val,onChange,children}){
  return <select value={val} onChange={e=>onChange(e.target.value)}
    style={{width:"100%",padding:"8px 12px",borderRadius:8,border:BD,background:"white",fontSize:12,outline:"none"}}>
    {children}
  </select>;
}
function Card({label,value,unit,formula,badge,bc}){
  const colors={blue:["#eff6ff","#1d4ed8","#bfdbfe"],orange:["#fff7ed","#c2410c","#fed7aa"],
                red:["#fef2f2","#b91c1c","#fecaca"],green:["#f0fdf4","#d97706","#bbf7d0"],
                default:["#f9fafb","#374151","#e5e7eb"]};

  return(

/* ═══ 메인 앱 ════════════════════════════════════════════════ */
function App(){
  const [tab,setTab]=useState(0);
  const [showFormula,setShowFormula]=useState(false);
  const today=new Date();
  const todayStr=`${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,"0")}-${String(today.getDate()).padStart(2,"0")}`;

  /* 프로젝트 정보 */
  const [proj,setProj]=useState({name:"만민 건축사 신사옥 신축공사 현장",designer:"김만민",date:todayStr});
  const sp=(k,v)=>setProj(p=>({...p,[k]:v}));

  /* 시스템 파라미터 */
  const [sys,setSys]=useState({
    baseType:"A2",       // 기준 유형
    actualHead:20,       // 실양정 h1 (m)
    pumpDia:65,          // 펌프 토출구경
    pumpEff:55,          // 펌프 효율 (%)
    transType:"1",
    pipeType:"SCH10",
    branchVelLimit:6,
    otherVelLimit:10,
  });
  const ss=(k,v)=>setSys(s=>({...s,[k]:v}));

  /* 배관 구간 */
  const [segs,setSegs]=useState([
    {flow:100,dia:50,len:20,e90:2,e45:0,teeB:1,teeS:0,gate:1,ball:0,angle:0,check:1},
    {flow: 50,dia:40,len:15,e90:1,e45:0,teeB:0,teeS:1,gate:0,ball:0,angle:0,check:0},
  ]);
  const updSeg=(i,k,v)=>setSegs(s=>s.map((r,idx)=>idx===i?{...r,[k]:v}:r));
  const addSeg=()=>setSegs(s=>[...s,mkSeg()]);
  const remSeg=(i)=>setSegs(s=>s.filter((_,idx)=>idx!==i));

  /* ═══ A4 계산서 반응형 스케일링 ═══
     transform-origin:0 0 + translateX(lOff)scale(s):
     ① 794px(A4폭)을 좌상단 기준으로 축소
     ② lOff = (outerW − 794×scale) / 2 → 정확한 중앙 정렬
     ③ outer.height = inner.scrollHeight×scale+40 → 여러 장 빈공간 없음
     인쇄 시 @media print { transform:none!important } 으로 원본 복원   */
  useEffect(()=>{
    if(tab!==2)return;
    function scaleRpt(){
      const outer=document.getElementById('rpt-outer');
      const inner=document.getElementById('rpt-inner');
      if(!outer||!inner)return;
      const A4W=794;
      const outerW=outer.clientWidth;
      const scale=Math.min(1,(outerW-24)/A4W);
      if(scale>=1){
        inner.style.cssText='width:794px;margin:0 auto;';
        outer.style.height='auto';
      }else{
        const lOff=Math.max(0,(outerW-A4W*scale)/2);
        inner.style.cssText=`width:794px;transform-origin:0 0;transform:translateX(${lOff}px) scale(${scale});`;
        outer.style.height=(inner.scrollHeight*scale+40)+'px';
      }
    }
    const t=setTimeout(scaleRpt,120);
    window.addEventListener('resize',scaleRpt);
    return()=>{clearTimeout(t);window.removeEventListener('resize',scaleRpt);};
  },[tab,segs,sys,proj]);

  /* ═══ PWA 설치 프롬프트 ═══ */
  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstallBanner,setShowInstallBanner]=useState(false);
  useEffect(()=>{
    const h=(e)=>{
      e.preventDefault();
      setInstallPrompt(e);
      /* ★ Ver 3.2: 재설치 상황이므로 pwa-installed 플래그 초기화 */
      sessionStorage.removeItem('pwa-installed');
      if(!window.matchMedia('(display-mode:standalone)').matches) setShowInstallBanner(true);
    };
    window.addEventListener('beforeinstallprompt',h);
    return()=>window.removeEventListener('beforeinstallprompt',h);
  },[]);
  const handleInstall=async()=>{
    if(!installPrompt)return;
    installPrompt.prompt();
    const r=await installPrompt.userChoice;
    if(r.outcome==='accepted'){
      console.log('[PWA v3.2] 설치 완료');
      /* ★ Ver 3.2: 설치 완료 플래그 기록 */
      sessionStorage.setItem('pwa-installed','1');
    }
    setInstallPrompt(null);setShowInstallBanner(false);
  };
  const deferredPrompt=installPrompt; /* PWA 설치 FAB에서 참조 */

  /* ═══ 계산 ══════════════════════════════════════════════ */
  const C=useMemo(()=>{
    const btype=BASE_HEAD_TYPES.find(x=>x.key===sys.baseType)||BASE_HEAD_TYPES[0];
    const A=btype.n;
    const B=btype.q;                      // 방사량 (50 or 80 L/min)
    const T=btype.t;                      // 방사시간 (10 or 20분)
    const Clpm=A*B;                       // 펌프 토출량 (ℓ/min)
    const D=A*B*T/1000;                   // 수원 용량 (m³) — NFTC 103A §2.1.1.2

    const E=sys.actualHead;               // 실양정 h1
    const pCfg=PIPE_CONFIG[sys.pipeType]||PIPE_CONFIG.SCH10;

    /* 배관 구간별 마찰손실 */
    const sdets=segs.map(s=>{
      const eq=FITTING_EQ[s.dia]||FITTING_EQ[100];
      const counts=[s.e90,s.e45,s.teeB,s.teeS,s.gate,s.ball,s.angle,s.check];
      const fittingLen=counts.reduce((sum,cnt,j)=>sum+(cnt*eq[j]),0);
      const fl=s.len+fittingLen;          // 상당직관 합계
      const fric=calcFriction(s.flow,s.dia,sys.pipeType); // m/100m
      const hl=fric*fl/100;              // 손실수두 (m)
      const vel=calcVelocity(s.flow,s.dia,sys.pipeType);
      return{fl,fric,hl,vel};
    });
    const F=sdets.reduce((sum,d)=>sum+d.hl,0); // 배관 마찰손실 합계 h2
    const G=NOZZLE_HEAD;                // 헤드 최소 방수압력 환산수두 h3 = 10m (0.1 MPa)
    const I=(E+F+G)*0.1;               // 안전율 10%
    const Jraw=E+F+G+I;
    const J=Math.ceil(Jraw);           // 전양정 (올림)

    const N=sys.pumpEff/100;
    const K=TRANS_TYPE[sys.transType]?.k||1.1;
    const M=Clpm/1000;                  // m³/min
    const Pkw=0.163*M*J*K/N;
    const Php=nextHP(Pkw);

    return{A,B,T,Clpm,D,E,F,G,I,Jraw,J,N,K,M,Pkw,Php,pCfg,sdets,btype};
  },[sys,segs]);

  /* 유속 경고 */
  const velWarnings=segs.map((s,i)=>{
    const vel=C.sdets[i]?.vel||0;
    const lim=sys.branchVelLimit||6;
    return vel>10?"⚠ 초과(10m/s)":vel>lim?"⚡ 가지배관초과":"";
  });

  const flowOpts=useMemo(()=>{
    const opts=[];
    const maxN=Math.max(C.A,10);
    for(let n=1;n<=maxN;n++) opts.push(n*C.B);
    return opts;
  },[C.A,C.B]);

  /* 탭 스타일 */
  const tabs=["① 데이터 입력","② 계산 결과","③ 계산서 출력"];
  const tabStyle=(i)=>({
    padding:"11px 28px",cursor:"pointer",border:"none",fontWeight:700,fontSize:13,
    fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:"0.02em",
    background:tab===i?"#d97706":"white",
    color:tab===i?"white":"#374151",
    borderBottom:tab===i?"3px solid #fbbf24":"3px solid transparent",
    transition:"all 0.15s",
  });

  return(
    <>
    <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#f0fdf4 0%,#f1f5f9 100%)"}}>

      {/* ── 헤더 ── */}
      <div className="no-print" style={{background:"linear-gradient(135deg,#451a03,#92400e,#d97706)",color:"white",padding:"20px 0 0"}}>
        <div className="hdr-pad" style={{maxWidth:1200,margin:"0 auto",padding:"0 24px"}}>
          <div className="hdr-row">
            <div>
              <div style={{fontSize:11,fontWeight:600,opacity:0.7,letterSpacing:"0.15em",textTransform:"uppercase",marginBottom:6}}>
                Easy Sprinkler Equipment (간이)
              </div>
              <h1 className="hdr-h1" style={{fontSize:26,fontWeight:900,letterSpacing:"0.04em",lineHeight:1.2}}>
                간이스프링클러설비 펌프 용량 계산서
              </h1>
              <div style={{fontSize:11,marginTop:8,opacity:0.85,fontFamily:"'Noto Sans KR',sans-serif",letterSpacing:"0.02em"}}>
                Easy Sprinkler Pump Capacity Calculator · NFPC/NFTC 103A 적용 &nbsp;
                <span style={{fontFamily:"'Orbitron',sans-serif",fontWeight:900,fontSize:12,color:"#fde68a",letterSpacing:"0.08em",textShadow:"0 0 8px rgba(253,230,138,0.6)"}}>
                  MANMIN · Ver-3.2
                </span>
              </div>
            </div>
            <div className="hdr-right" style={{textAlign:"right",opacity:0.75,fontSize:11}}>
              <div style={{fontWeight:700,fontSize:13}}>NFTC 103A</div>
              <div>간이스프링클러설비의</div>
              <div>화재안전기술기준</div>
              <div style={{marginTop:4,fontSize:10,color:"#fde68a"}}>[시행 2024. 12. 1.]</div>
            </div>
          </div>
          {/* 탭 */}
          <div className="tab-bar-wrap">
            {tabs.map((t,i)=><button key={i} onClick={()=>setTab(i)} style={tabStyle(i)}>{t}</button>)}
          </div>
        </div>
      </div>

      {/* ── 요약 바 ── */}
      <div className="no-print" style={{background:"#0f172a",padding:"10px 0"}}>
        <div style={{maxWidth:1200,margin:"0 auto",padding:"0 24px"}} className="sum-bar">
          {[["🔢 기준헤드",`${C.A}개×${C.B}ℓ/min`],["📌 토출량",`${C.Clpm} ℓ/min`],["💧 수원",`${f3(C.D)} m³`],

<!-- ═══ Service Worker Ver 3.2 — 재설치 문제 원천 차단 ═══ -->
<script>
(function(){
  'use strict';
  if(!('serviceWorker' in navigator)) return;

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js', {updateViaCache:'none'})
      .then(reg => {
        console.log('[PWA v3.2] SW 등록 — scope:', reg.scope);

        /* ★ 핵심: 대기 중인 SW가 있으면 즉시 skipWaiting 적용
           재설치 후 이전 SW가 waiting 상태로 남아 있을 때 처리 */
        if(reg.waiting) {
          console.log('[PWA v3.2] waiting SW 감지 → skipWaiting 즉시 적용');
          reg.waiting.postMessage({type:'SKIP_WAITING'});
        }

        /* 업데이트 감지 → 배너 표시 */
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if(!nw) return;
          nw.addEventListener('statechange', () => {
            if(nw.state === 'installed' && navigator.serviceWorker.controller)
              _showUpdateBanner();
          });
        });

        /* 1시간마다 업데이트 체크 */
        setInterval(() => reg.update(), 60 * 60 * 1000);
      })
      .catch(e => console.warn('[PWA v3.2] SW 등록 실패:', e));

    /* 컨트롤러 교체 시 자동 새로고침 */
    let _ref = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if(!_ref){ _ref = true; location.reload(); }
    });

    /* SW로부터 CACHE_CLEARED 메시지 수신 시 페이지 새로고침 */
    navigator.serviceWorker.addEventListener('message', (event) => {
      if(event.data && event.data.type === 'CACHE_CLEARED') {
        console.log('[PWA v3.2] 캐시 초기화 완료 → 새로고침');
        location.reload();
      }
    });
  });

  /* appinstalled 이벤트 — 설치 완료 시 플래그 기록 */
  window.addEventListener('appinstalled', () => {
    console.log('[PWA v3.2] 설치 완료 (appinstalled)');
    sessionStorage.setItem('pwa-installed', '1');
  });

  /* standalone 모드로 실행 중이면 설치 UI 숨김 */
  if(window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone === true){
    document.addEventListener('DOMContentLoaded', () => {
      const btn = document.getElementById('pwa-hdr-btn');
      if(btn) btn.style.display = 'none';
    });
  }

  function _showUpdateBanner() {
    if(document.getElementById('sw-update-banner')) return;
    const b = document.createElement('div');
    b.id = 'sw-update-banner';
    b.style.cssText = [
      'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:99999',
      'background:#92400e;color:white;border-radius:14px;padding:12px 18px',
      'display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.35)',
      'font-family:"Noto Sans KR",sans-serif;font-size:13px;white-space:nowrap',
      'animation:slideUp 0.35s ease-out',
      'border:1px solid rgba(255,255,255,0.2)',
    ].join(';');
    b.innerHTML =
      '<span>🔄 새 버전 (v3.2) 이 있습니다</span>' +
      '<button onclick="(function(){' +
        'document.getElementById(\'sw-update-banner\').remove();' +
        'navigator.serviceWorker.ready.then(r=>{if(r.waiting)r.waiting.postMessage({type:\'SKIP_WAITING\'});});' +
      '})()" style="background:white;color:#92400e;border:none;border-radius:8px;' +
        'padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;">업데이트</button>' +
      '<button onclick="document.getElementById(\'sw-update-banner\').remove()" ' +
        'style="background:rgba(255,255,255,0.15);color:white;border:none;border-radius:8px;' +
        'padding:6px 10px;font-size:11px;cursor:pointer;">나중에</button>';
    document.body.appendChild(b);
  }

  /* ★ 긴급 캐시 초기화 — 콘솔에서 clearPwaCache() 호출 가능 */
  window.clearPwaCache = function(){
    if(!navigator.serviceWorker.controller){
      console.warn('[PWA v3.2] 활성 SW 없음');
      return;
    }
    navigator.serviceWorker.controller.postMessage({type:'CLEAR_CACHE'});
    console.log('[PWA v3.2] CLEAR_CACHE 전송 — 캐시 초기화 중...');
  };
})();
</script>
